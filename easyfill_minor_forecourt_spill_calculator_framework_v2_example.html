<!DOCTYPE html>
<html lang="en-GB">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Easyfill™ Minor Forecourt Spill Cost Calculator</title><style>
    :root {
      --easyfill-navy:#10263f; --easyfill-blue:#1f75bc; --easyfill-light-blue:#eaf5ff;
      --easyfill-green:#39a935; --easyfill-grey:#f5f7fa; --easyfill-dark-grey:#4a5568;
      --easyfill-border:#d7e1ea; --easyfill-white:#ffffff; --easyfill-warning:#fff4db;
      --easyfill-shadow:0 12px 32px rgba(16,38,63,.08); --easyfill-radius:22px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#eaf5ff 100%);color:var(--easyfill-navy);line-height:1.5}
    .calculator-wrap{max-width:1120px;margin:0 auto;padding:18px 16px}.brand-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.easyfill-logo{display:block;width:min(310px,72vw);height:auto}.strapline{color:var(--easyfill-navy);font-weight:700;font-size:.95rem;text-align:right}
    .hero{background:var(--easyfill-navy);color:#fff;border-radius:24px;padding:30px;margin-bottom:22px;box-shadow:0 18px 45px rgba(16,38,63,.18);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:280px;height:280px;right:-90px;top:-90px;background:rgba(31,117,188,.35);border-radius:50%}.brand-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.12);font-size:.88rem;letter-spacing:.02em;margin-bottom:16px;position:relative;z-index:1}.brand-dot{width:9px;height:9px;background:var(--easyfill-green);border-radius:50%;display:inline-block}h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.05;margin:0 0 14px;max-width:820px;position:relative;z-index:1}.hero p{max-width:800px;font-size:1.05rem;margin:0;color:#dbeafe;position:relative;z-index:1}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:stretch}.card{background:#fff;border:1px solid var(--easyfill-border);border-radius:var(--easyfill-radius);padding:24px;box-shadow:var(--easyfill-shadow)}.card h2{margin:0 0 8px;font-size:1.45rem}.intro-text{margin:0 0 18px;color:var(--easyfill-dark-grey)}.input-group{margin-bottom:16px}label{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-weight:700;margin-bottom:7px;color:var(--easyfill-navy)}.hint{font-weight:400;font-size:.82rem;color:var(--easyfill-dark-grey)}input,select{width:100%;padding:13px 14px;border:1px solid var(--easyfill-border);border-radius:12px;font-size:1rem;color:var(--easyfill-navy);background:#fff;outline:none;transition:border .2s ease,box-shadow .2s ease}input:focus,select:focus{border-color:var(--easyfill-blue);box-shadow:0 0 0 4px rgba(31,117,188,.12)}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .results-card{height:100%;position:sticky;top:18px;background:var(--easyfill-navy);color:#fff;border:none}.results-card h2,.results-card .intro-text{color:#fff}.result-main{background:linear-gradient(135deg,var(--easyfill-blue),#134d7c);border-radius:18px;padding:24px;margin:20px 0;text-align:center}.result-main span{display:block;color:#dbeafe;font-size:.95rem;margin-bottom:6px}.result-main strong{font-size:clamp(2.1rem,5vw,3.2rem);line-height:1}.metric-grid{display:grid;gap:12px}.metric{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:15px;padding:14px;display:flex;justify-content:space-between;gap:16px}.metric span{color:#dbeafe}.metric strong{text-align:right;color:#fff}.cost-section{border-radius:16px;padding:14px;margin-top:14px}.cost-section h3{margin:0 0 10px;font-size:1rem;color:#fff;display:flex;justify-content:space-between;gap:12px;align-items:baseline}.section-label{color:#dbeafe;font-size:.82rem;font-weight:400}.green-section{background:rgba(57,169,53,.18);border:1px solid rgba(57,169,53,.42)}.blue-section{background:rgba(31,117,188,.18);border:1px solid rgba(31,117,188,.42)}.warning-section{background:rgba(255,244,219,.18);border:1px solid rgba(255,225,166,.42)}
    .narrative{background:var(--easyfill-warning);border:1px solid #ffe1a6;color:#4d3b0a;border-radius:18px;padding:18px;margin-top:18px;font-size:.97rem}.cta{background:var(--easyfill-light-blue);border:1px solid #cce8ff;border-radius:22px;padding:24px;margin-top:22px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.cta h3{margin:0 0 6px;font-size:1.4rem}.cta p{margin:0;color:var(--easyfill-dark-grey)}.button{display:inline-block;text-decoration:none;background:var(--easyfill-green);color:#fff;padding:14px 20px;border-radius:999px;font-weight:700;white-space:nowrap;box-shadow:0 8px 18px rgba(57,169,53,.22)}.small-print{margin-top:16px;color:var(--easyfill-dark-grey);font-size:.84rem}.section-note{font-size:.82rem;color:#dbeafe;margin:-4px 0 10px}
    @media (max-width:860px){.brand-header{flex-direction:column;align-items:flex-start}.strapline{text-align:left}.grid,.cta,.two-col{grid-template-columns:1fr}.results-card{position:static}.hero,.card,.cta{padding:22px}}
</style></head>

function gbp(value, digits=0) { return new Intl.NumberFormat('en-GB', { style:'currency', currency:'GBP', maximumFractionDigits:digits }).format(value || 0); }
function number(value, digits=1) { return new Intl.NumberFormat('en-GB', { maximumFractionDigits:digits }).format(value || 0); }
function safeNum(id) { const el=document.getElementById(id); return Math.max(0, Number(el?.value) || 0); }
function formatValue(value, format) { if(format==='currency') return gbp(value); if(format==='litres') return number(value) + ' litres'; if(format==='percent') return number(value) + '%'; return number(value); }

function calculate(values) {
  const forecourts = Math.max(1, values.forecourts || 1);
  const annualSpillsPerSite = values.spills * 365;
  const annualSpills = annualSpillsPerSite * forecourts;
  const litresWastedPerSite = (values.spillSize * annualSpillsPerSite) / 1000;
  const litresWasted = litresWastedPerSite * forecourts;
  const customerFuelLoss = litresWasted * values.fuelPrice;
  const labourCost = (values.minutes / 60) * values.hourlyRate * annualSpills;
  const materialsCost = values.consumables * annualSpills;
  const main = labourCost + materialsCost;
  const siteCost = main / forecourts;
  const forecourtWord = forecourts === 1 ? 'forecourt' : 'forecourts';
  return {
    main, annualSpills, siteCost, labourCost, materialsCost, litresWasted, customerFuelLoss,
    narrative: `Across ${forecourts} ${forecourtWord}, minor spills could be costing your operation around ${gbp(main)} per year in staff time and clean-up materials. Customers may also be losing around ${gbp(customerFuelLoss)} per year in wasted fuel.`
  };
}

function renderField(field) {
  const attrs = `id="${field.id}" ${field.min!==undefined?'min="'+field.min+'"':''} ${field.step!==undefined?'step="'+field.step+'"':''}`;
  let control = '';
  if(field.type === 'select') { control = `<select ${attrs}>${field.options.map(o=>`<option value="${o.value}" ${o.value==field.value?'selected':''}>${o.label}</option>`).join('')}</select>`; }
  else { control = `<input type="${field.type || 'number'}" value="${field.value}" ${attrs} />`; }
  return `<div class="input-group"><label for="${field.id}">${field.label} <span class="hint">${field.hint || ''}</span></label>${control}</div>`;
}

function renderInputs(fields) {
  const used = new Set(); let html = '';
  fields.forEach(f => {
    if(used.has(f.id)) return;
    if(f.group) { const group = fields.filter(x=>x.group===f.group); group.forEach(x=>used.add(x.id)); html += `<div class="two-col">${group.map(renderField).join('')}</div>`; }
    else { used.add(f.id); html += renderField(f); }
  });
  return html;
}

function renderResults(sections) {
  return sections.map((s, i) => {
    const body = `<div class="metric-grid">${s.items.map(item=>`<div class="metric"><span>${item.label}</span><strong data-result="${item.key}" data-format="${item.format}">0</strong></div>`).join('')}</div>`;
    if(!s.style && i===0) return body;
    return `<div class="cost-section ${s.style || ''}"><h3>${s.title}${s.note?` <span class="section-label">${s.note}</span>`:''}</h3>${body}</div>`;
  }).join('');
}

function renderApp(config) {
  document.title = config.meta.title;
  document.getElementById('app').innerHTML = `
    <header class="brand-header"><img class="easyfill-logo" src="${EASYFILL_LOGO}" alt="Easyfill logo"><div class="strapline">${config.meta.strapline}</div></header>
    <section class="hero"><div class="brand-pill"><span class="brand-dot"></span> ${config.hero.pill}</div><h1>${config.hero.title}</h1><p>${config.hero.intro}</p></section>
    <section class="grid"><div class="card"><h2>${config.inputs.title}</h2><p class="intro-text">${config.inputs.intro}</p>${renderInputs(config.inputs.fields)}<p class="small-print">${config.inputs.smallPrint}</p></div>
    <aside class="card results-card"><h2>${config.results.title}</h2><p class="intro-text">${config.results.intro}</p><div class="result-main"><span>${config.results.mainLabel}</span><strong id="mainResult">£0</strong></div>${renderResults(config.results.sections)}</aside></section>
    <section class="narrative" id="narrativeText"></section><section class="cta"><div><h3>${config.cta.title}</h3><p>${config.cta.text}</p></div><a class="button" href="${config.cta.href}">${config.cta.button}</a></section>`;
  config.inputs.fields.forEach(f => { const el=document.getElementById(f.id); el.addEventListener('input', update); el.addEventListener('change', update); });
  update();
}

function update() {
  const values = Object.fromEntries(CalculatorConfig.inputs.fields.map(f => [f.id, safeNum(f.id)]));
  const result = calculate(values);
  document.getElementById('mainResult').textContent = gbp(result.main);
  document.querySelectorAll('[data-result]').forEach(el => { const key=el.dataset.result; el.textContent = formatValue(result[key], el.dataset.format); });
  document.getElementById('narrativeText').textContent = result.narrative;
}

renderApp(CalculatorConfig);
</script>
</body></html>
